name: Build and Release DMF

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      make_release:
        description: "Create GitHub Release?"
        type: boolean
        required: true
        default: false
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: false
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Get version from tag
        id: get_version
        run: |
          if ("${{ github.event_name }}" -eq "push" -and "${{ startsWith(github.ref, 'refs/tags/') }}" -eq "True") {
            $tag = "${{ github.ref_name }}"
          } else {
            $tag = "${{ github.event.inputs.version }}"
          }
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Publish DMF (win-x64, single file, self-contained)
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:DebugType=none `
            -p:Version=${{ env.VERSION }} `
            -o ./publish

      - name: Archive published files
        run: |
          $zipName = "DMF-${{ env.VERSION }}-win-x64.zip"
          Compress-Archive -Path ./publish/* -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: DMF-${{ env.VERSION }}-win-x64
          path: ./publish

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.make_release == 'true')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          tag_name: ${{ env.TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
